[build-system]
requires = ["uv_build>=0.9.0,<0.12.0"]
build-backend = "uv_build"

[project]
name = "tealetio"
version = "0.1.0rc1"
description = "Scheduler, synchronisation, selector, and asyncio helpers for tealet"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "Kristján Valur Jónsson", email = "sweskman@gmail.com"}
]
keywords = ["coroutines", "scheduler", "asyncio", "greenlets", "tealets"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3.15",
]
dependencies = [
    "asynkit>=0.19.1",
    "tealet>=0.1.0rc2,<0.2",
]

[project.urls]
Homepage = "https://github.com/kristjanvalur/pytealet/tree/main/packages/tealetio"
Documentation = "https://github.com/kristjanvalur/pytealet/tree/main/packages/tealetio/docs"
Repository = "https://github.com/kristjanvalur/pytealet"
Source = "https://github.com/kristjanvalur/pytealet/tree/main/packages/tealetio"
Changelog = "https://github.com/kristjanvalur/pytealet/blob/main/packages/tealetio/CHANGELOG.md"
Issues = "https://github.com/kristjanvalur/pytealet/issues"

[tool.uv.sources]
tealet = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=7.0",
    "ruff>=0.8",
]

[tool.ruff]
line-length = 120
extend-exclude = [
    "tests/**",
]

[tool.ruff.lint.per-file-ignores]
"src/tealetio/__init__.py" = ["F403"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
