name: CI

on:
  push:
    branches:
      - development
      - c-api
      - green-tealet
      - chore/libtealet-release-primary
      - main
  pull_request:

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check uv lockfile
        run: uv lock --check

      - name: Run quality checks
        run: make check

  test:
    name: Tests (py${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    env:
      PYTEALET_EXT_DEBUG: "1"
      PYTEALET_SKIP_LONG_GREENLET_TESTS: "1"
      PYTEALET_RUN_UPSTREAM_GREENLET_TESTS: "0"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python ${{ matrix.python-version }} with uv
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Sync dependencies
        run: |
          source .venv/bin/activate
          uv sync --active --locked --dev

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v
