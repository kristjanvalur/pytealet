name: tealetio Build And Publish

"on":
  push:
    tags:
      - "tealetio-v*"
  workflow_dispatch:

jobs:
  build_package:
    name: Build tealetio package
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'tealetio-v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12 with uv
        run: uv python install 3.12

      - name: Build tealetio sdist and wheel
        run: uv build --package tealetio --out-dir dist/tealetio

      - name: Upload tealetio artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tealetio-dist
          path: dist/tealetio/*

  publish_pypi:
    name: Publish tealetio to PyPI
    needs:
      - build_package
    runs-on: ubuntu-latest
    environment: pypi-tealetio
    if: >-
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      startsWith(github.event.release.tag_name, 'tealetio-v')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten dist tree
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;
          ls -la publish-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist/
          print-hash: true
