name: Build And Publish

"on":
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: "x86_64 i686 aarch64"
          - os: macos-13
            archs: "x86_64"
          - os: macos-14
            archs: "arm64"
          - os: windows-latest
            archs: "AMD64 x86"
    env:
      BUILD_LIBTEALET_FROM_SOURCE: "0"
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp313t-* cp314-* cp314t-* cp315-* cp315t-*"
      CIBW_SKIP: "pp* *-musllinux*"
      CIBW_TEST_COMMAND: "python -c \"import _tealet; import tealet.greenlet; print('wheel smoke ok')\""
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU (Linux cross-arch)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_pypi:
    name: Publish to PyPI
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten dist tree
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;
          ls -la publish-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist/
          print-hash: true
