name: tealet Build And Publish

"on":
  push:
    tags:
      - "tealet-v*"
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.archs }})
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'tealet-v') ||
      startsWith(github.event.release.tag_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: "x86_64 i686 aarch64"
          - os: macos-14
            archs: "x86_64"
            macosx_deployment_target: "10.13"
          - os: macos-14
            archs: "arm64"
            macosx_deployment_target: "11.0"
          - os: windows-2022
            archs: "AMD64 x86"
          - os: windows-11-arm
            archs: "ARM64"
    env:
      BUILD_LIBTEALET_FROM_SOURCE: "0"
      CIBW_ARCHS: ${{ matrix.archs }}
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* cp314t-*"
      CIBW_SKIP: "*-musllinux*"
      CIBW_TEST_COMMAND: "python -c \"import _tealet; import tealet; print('wheel smoke ok')\""
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macosx_deployment_target }}" >> "$GITHUB_ENV"

      - name: Set up QEMU (Linux cross-arch)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'tealet-v') ||
      startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_pypi:
    name: Publish tealet to PyPI
    needs:
      - build_wheels
      - build_sdist
    runs-on: ubuntu-latest
    environment: pypi-tealet
    if: >-
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      (startsWith(github.event.release.tag_name, 'tealet-v') ||
      startsWith(github.event.release.tag_name, 'v'))
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten dist tree
        run: |
          mkdir -p publish-dist
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} publish-dist/ \;
          ls -la publish-dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist/
          print-hash: true
