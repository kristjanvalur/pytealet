name: tealetio CI

on:
  push:
    branches:
      - main
      - development
      - experiment/tealetio-workspace-split
    paths:
      - ".github/workflows/tealetio-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "packages/tealetio/**"
  pull_request:
    paths:
      - ".github/workflows/tealetio-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "packages/tealetio/**"

jobs:
  test:
    name: tealetio tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      PYTEALET_EXT_DEBUG: "1"
      PYTEALET_SKIP_LONG_GREENLET_TESTS: "1"
      PYTEALET_RUN_UPSTREAM_GREENLET_TESTS: "0"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python ${{ matrix.python-version }} with uv
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Sync tealetio dependencies
        run: |
          source .venv/bin/activate
          uv sync --active --dev --package tealetio

      - name: Run tealetio tests
        run: |
          source .venv/bin/activate
          uv run --active --package tealetio python -m pytest packages/tealetio/tests/ -v
