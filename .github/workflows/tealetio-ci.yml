name: tealetio CI

on:
  push:
    branches:
      - main
      - development
      - experiment/tealetio-workspace-split
    paths:
      - ".github/workflows/tealetio-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "packages/tealetio/**"
  pull_request:
    paths:
      - ".github/workflows/tealetio-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "packages/tealetio/**"

jobs:
  test:
    name: tealetio tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      PYTEALET_EXT_DEBUG: "1"
      PYTEALET_SKIP_LONG_GREENLET_TESTS: "1"
      PYTEALET_RUN_UPSTREAM_GREENLET_TESTS: "0"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check uv lockfile
        run: uv lock --check

      - name: Install Python ${{ matrix.python-version }} with uv
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Sync tealetio dependencies
        run: |
          source .venv/bin/activate
          uv sync --active --locked --dev --package tealetio

      - name: Report tealetio runtime environment
        run: |
          source .venv/bin/activate
          python - <<'PY'
          import importlib.util
          import platform
          import sys
          import sysconfig

          import tealet
          import uring_api

          print("python:", sys.version.replace("\n", " "))
          print("implementation:", platform.python_implementation())
          print("gil_enabled:", getattr(sys, "_is_gil_enabled", lambda: "unknown")())
          print("platform:", platform.platform())
          print("kernel:", platform.release())
          print("tealet:", getattr(tealet, "__version__", "unknown"))

          native_error = getattr(uring_api, "_native_import_error", None)
          print("uring_api native extension:", "loaded" if native_error is None else f"unavailable ({native_error})")
          print("uring_api.__liburing_version__:", uring_api.__liburing_version__)
          print("uring_api.__compiled_liburing_version__:", uring_api.__compiled_liburing_version__)
          print("uring_api.__compiled_liburing_version_info__:", uring_api.__compiled_liburing_version_info__)

          ext_suffix = sysconfig.get_config_var("EXT_SUFFIX")
          if ext_suffix:
              spec = importlib.util.find_spec("_uring_api")
              if spec is None or spec.origin is None:
                  print("_uring_api module:", "not installed")
              else:
                  print("_uring_api module:", spec.origin)

          probe = uring_api.probe()
          print("uring_api.probe():", probe)
          print("uring_api.is_available():", uring_api.is_available())
          PY
          echo "--- liburing packages (tealetio CI does not install liburing-dev) ---"
          apt-cache policy liburing-dev liburing2 2>/dev/null || true
          dpkg -l 'liburing*' 2>/dev/null || true

      - name: Run tealetio tests
        run: |
          source .venv/bin/activate
          uv run --active --package tealetio python -m pytest packages/tealetio/tests/ -v -ra
