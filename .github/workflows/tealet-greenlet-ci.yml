name: tealet-greenlet CI

on:
  push:
    branches:
      - main
      - development
    paths:
      - ".github/workflows/tealet-greenlet-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "packages/tealet-greenlet/**"
  pull_request:
    paths:
      - ".github/workflows/tealet-greenlet-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "packages/tealet-greenlet/**"

jobs:
  test:
    name: tealet-greenlet tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTEALET_EXT_DEBUG: "1"
      PYTEALET_SKIP_LONG_GREENLET_TESTS: "1"
      PYTEALET_RUN_UPSTREAM_GREENLET_TESTS: "0"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15", "3.15t"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check uv lockfile
        run: uv lock --check

      - name: Install Python ${{ matrix.python-version }} with uv
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Sync tealet-greenlet dependencies
        run: |
          source .venv/bin/activate
          uv sync --active --locked --dev --package tealet-greenlet

      - name: Run tealet-greenlet tests
        run: |
          source .venv/bin/activate
          uv run --active --package tealet-greenlet python -m pytest packages/tealet-greenlet/tests/ -v
