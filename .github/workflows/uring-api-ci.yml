name: uring-api CI

on:
  push:
    branches:
      - main
      - development
      - experiment/linux-proactor
    paths:
      - ".github/workflows/uring-api-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/uring_api/**"
  pull_request:
    paths:
      - ".github/workflows/uring-api-ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/uring_api/**"

jobs:
  test:
    name: uring-api Linux tests (py${{ matrix.python-version }})
    # io_uring is Linux-only. Keep this workflow on Linux runners; future CI can
    # expand this axis to cover different kernel/io_uring support levels.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install liburing
        run: sudo apt-get update && sudo apt-get install -y liburing-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check uv lockfile
        run: uv lock --check

      - name: Install Python ${{ matrix.python-version }} with uv
        run: uv python install ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Sync uring-api dependencies
        run: |
          source .venv/bin/activate
          uv sync --active --locked --dev --package uring-api

      - name: Run uring-api tests
        run: |
          source .venv/bin/activate
          uv run --active --package uring-api python -m pytest packages/uring_api/tests/ -v